<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LV-Manager v2 | Riedel Bau AG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LV-Manager">
<script>
// ── Service Worker registrieren (echte Datei auf GitHub Pages) ───────────
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1e3a5f;--mid:#2e5fa3;--light:#d6e4f7;--red:#c0392b;
  --green:#16a34a;--gbg:#dcfce7;--warn:#d97706;--wbg:#fef3c7;
  --rbg:#fee2e2;--sbg:#fef0d5;--abg:#e8f4fd;
  --gray:#f0f2f5;--muted:#6b7280;--border:#d1d5db;--yin:#fffde7;
  --sidebar:220px;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--gray);color:#111827;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
*{box-sizing:border-box}
input,textarea,select,button{font-family:inherit}
button{cursor:pointer;border:none;border-radius:5px;font-weight:600;transition:filter .12s,transform .1s}
button:hover{filter:brightness(1.08)}
button:active{transform:scale(.98)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c0ccd8;border-radius:3px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:var(--dark);color:#fff;padding:0 16px;border-bottom:3px solid var(--red);flex-shrink:0;z-index:100}
.topbar-inner{display:flex;align-items:center;gap:12px;height:48px}
.tb-logo{font-size:16px;font-weight:700;white-space:nowrap}
.tb-sub{font-size:9px;color:#7ec8e3;letter-spacing:1.5px;text-transform:uppercase}
.tb-sep{width:1px;height:28px;background:rgba(255,255,255,.15);margin:0 4px}
.tb-btn{padding:5px 12px;font-size:11px;font-weight:700;border-radius:4px}
.tb-btn.green{background:var(--green);color:#fff}
.tb-btn.red{background:var(--red);color:#fff}
.tb-btn.ghost{background:rgba(255,255,255,.12);color:#fff}
.tb-btn.purple{background:#7c3aed;color:#fff}
.tb-spacer{flex:1}
.tb-status{font-size:10px;color:#7ec8e3;font-family:'IBM Plex Mono',monospace}

#body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-section{padding:10px 10px 4px;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #f3f4f6}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;transition:background .12s;font-size:12px;color:#374151}
.sb-item:hover{background:#f9fafb}
.sb-item.active{background:var(--light);border-color:var(--dark);color:var(--dark);font-weight:600}
.sb-item.archived{color:var(--muted);font-style:italic}
.sb-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.sb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0}
.sb-badge.crit{background:var(--rbg);color:#dc2626}
.sb-badge.sum{background:var(--gbg);color:var(--green);font-family:'IBM Plex Mono',monospace}
.sb-new{margin:8px;padding:7px;background:var(--dark);color:#fff;font-size:12px;border-radius:5px;width:calc(100% - 16px);text-align:center}
.sb-search{margin:8px;padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;width:calc(100% - 16px)}
.sb-search:focus{outline:none;border-color:var(--mid)}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.tabs-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0}
.tab{padding:10px 16px;font-size:12px;font-weight:600;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);border-radius:0}
.tab.active{border-color:var(--dark);color:var(--dark)}
.tab-spacer{flex:1}
.tab-pills{display:flex;align-items:center;gap:6px;padding:0 8px}
.tpill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.tpill.green{background:var(--gbg);color:var(--green);font-family:'IBM Plex Mono',monospace}
.tpill.red{background:var(--rbg);color:#dc2626}

.tab-body{flex:1;overflow-y:auto;padding:16px}

/* ── WELCOME ── */
.welcome{max-width:600px;margin:40px auto;text-align:center}
.welcome-icon{font-size:56px;margin-bottom:16px}
.welcome h1{font-size:22px;font-weight:700;color:var(--dark);margin-bottom:8px}
.welcome p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7}
.welcome-btns{display:flex;gap:10px;justify-content:center}

/* ── LV TAB ── */
.sec-card{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:14px;background:#fff}
.sec-hdr{background:var(--dark);padding:8px 12px;display:flex;align-items:center;gap:8px}
.sec-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7ec8e3;font-weight:700;min-width:24px}
.sec-inp{flex:1;background:transparent;border:none;color:#fff;font-size:12px;font-weight:700;outline:none;font-family:inherit}
.sec-btn{padding:3px 8px;font-size:10px;border-radius:3px}
.sec-collapse{background:rgba(255,255,255,.12);color:#fff}
.sec-del{background:var(--red);color:#fff}

.col-hdr{display:grid;grid-template-columns:28px 80px 1fr 66px 82px 82px 90px 140px 60px;gap:0;background:#f9fafb;padding:5px 10px;border-bottom:1px solid var(--border)}
.col-hdr span{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}

.pos-row{display:grid;grid-template-columns:28px 80px 1fr 66px 82px 82px 90px 140px 60px;border-bottom:1px solid #f3f4f6;align-items:start;padding:4px 10px}
.pos-row:hover{background:#fafbfc}
.pos-row.pos-added{background:#f0f7ff}
.pos-row input,.pos-row textarea,.pos-row select{border:1.5px solid var(--border);border-radius:4px;padding:3px 5px;width:100%;background:#fff;font-size:11px}
.pos-row input:focus,.pos-row textarea:focus,.pos-row select:focus{outline:none;border-color:#3b82f6;background:#eff6ff}
.gp-val{padding:5px 4px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;text-align:right;color:#16a34a}
.gp-empty{color:#d1d5db}
.pos-acts{display:flex;flex-direction:column;gap:2px;padding-top:2px}
.act-btn{padding:3px 6px;font-size:10px}
.act-dup{background:#eef2f7;color:#374151}
.act-del{background:var(--rbg);color:#dc2626}
.stat-sel{width:26px;border:none;border-radius:3px;font-size:12px;cursor:pointer;text-align:center;background:transparent;padding:2px 0}
.added-tag{font-size:9px;background:#e8f4fd;color:#1a5f8a;padding:1px 5px;border-radius:2px;font-weight:700;display:inline-block;margin-top:2px}

.add-pos-btn{background:var(--dark);color:#fff;padding:5px 12px;font-size:11px}
.sec-footer{padding:7px 10px;background:#f9fafb}
.add-sec-btn{width:100%;padding:8px;font-size:12px;background:#f3f4f6;color:var(--dark);border:2px dashed var(--border);border-radius:6px;margin-bottom:14px}

.totals-box{background:var(--dark);border-radius:7px;overflow:hidden}
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:9px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.tot-row.big{padding:13px 18px;background:rgba(255,255,255,.04);border:none}
.tot-lbl{color:#9bb0c0;font-size:12px}
.tot-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#fff}
.tot-val.gold{color:#fbbf24;font-size:16px}

/* ── STAMM TAB ── */
.stamm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:900px}
.sf{display:flex;flex-direction:column;gap:4px}
.sf.full{grid-column:1/-1}
.sf label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.sf input,.sf select,.sf textarea{border:1.5px solid var(--border);border-radius:5px;padding:7px 9px;background:#fff;font-size:12px}
.sf input:focus,.sf select:focus,.sf textarea:focus{outline:none;border-color:var(--mid)}

/* ── ANALYSE TAB ── */
.vob-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.vob-card{border-radius:7px;padding:12px 14px;border-left:4px solid}
.vc-icon{font-size:18px}
.vc-n{font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.vc-lbl{font-size:10px;font-weight:700;margin-top:1px}
.vob-tbl{width:100%;border-collapse:collapse;font-size:11px}
.vob-tbl th{background:#f9fafb;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:7px 10px;text-align:left;border-bottom:2px solid var(--border)}
.vob-tbl td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.note-inp{flex:1;border:1.5px solid #fbbf24;border-radius:4px;padding:4px 7px;font-size:11px;background:var(--yin);min-width:200px}

/* ── CLAUDE TAB ── */
.claude-chat{display:flex;flex-direction:column;height:100%;max-width:900px;gap:12px}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;line-height:1.6;max-width:85%}
.msg.user{background:var(--dark);color:#fff;align-self:flex-end;border-radius:8px 8px 2px 8px}
.msg.assistant{background:#fff;color:#111827;align-self:flex-start;border:1px solid var(--border);border-radius:8px 8px 8px 2px;white-space:pre-wrap}
.msg.thinking{background:#f9fafb;color:var(--muted);font-style:italic;border:1px dashed var(--border)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-inp{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:12px;resize:none;min-height:48px;max-height:140px;line-height:1.5}
.chat-inp:focus{outline:none;border-color:var(--mid)}
.chat-send{padding:9px 18px;background:var(--dark);color:#fff;border-radius:7px;font-size:12px;align-self:flex-end}
.chat-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.chat-opt{background:#eef2f7;color:var(--dark);padding:4px 10px;font-size:11px;border-radius:4px}
.apikey-banner{background:var(--wbg);border:1.5px solid var(--warn);border-radius:7px;padding:12px 14px;font-size:12px;color:#92400e;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.apikey-inp{border:1.5px solid var(--border);border-radius:5px;padding:5px 9px;font-size:12px;flex:1;font-family:'IBM Plex Mono',monospace}
.apikey-save{background:var(--dark);color:#fff;padding:5px 12px;font-size:11px}

/* ── ARCHIV TAB ── */
.arch-tbl{width:100%;border-collapse:collapse;font-size:12px}
.arch-tbl th{background:#f9fafb;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)}
.arch-tbl td{padding:8px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.arch-tbl tr:hover td{background:#fafbfc}
.arch-act{display:flex;gap:5px}
.arch-btn{padding:3px 8px;font-size:10px;border-radius:3px}

/* ── TOAST ── */
#toast{position:fixed;top:14px;right:14px;z-index:9999;padding:9px 16px;border-radius:6px;font-weight:700;font-size:12px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);display:none}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;padding:24px 28px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h3{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:8px}
.modal p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── PROJEKT ITEMS ── */
.proj-item{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:11px;color:#374151;border-left:3px solid transparent;transition:background .1s}
.proj-item:hover{background:#f9fafb}
.proj-item.active{background:#eff6ff;border-color:#2563eb;color:#1d4ed8;font-weight:700}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-count{font-size:9px;color:#9ca3af;margin-left:auto}
.proj-edit-btn{font-size:10px;background:none;border:none;color:#9ca3af;cursor:pointer;padding:0 2px;opacity:0;transition:opacity .1s}
.proj-item:hover .proj-edit-btn{opacity:1}
/* ── NORMEN PICKER ── */
.normen-picker{border:1.5px solid var(--border);border-radius:6px;background:#fff;overflow:hidden}
.normen-search{width:100%;padding:7px 10px;border:none;border-bottom:1px solid var(--border);font-size:12px;font-family:inherit;outline:none}
.normen-search:focus{border-color:var(--mid);background:#eff6ff}
.normen-scroll{max-height:220px;overflow-y:auto}
.normen-group{border-bottom:1px solid #f3f4f6}
.normen-group-hdr{padding:5px 10px;font-size:9px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;position:sticky;top:0;z-index:1}
.normen-group-hdr:hover{filter:brightness(1.1)}
.normen-item{display:flex;align-items:flex-start;gap:8px;padding:5px 10px 5px 16px;font-size:11px;cursor:pointer;transition:background .1s;line-height:1.4}
.normen-item:hover{background:#f9fafb}
.normen-item.selected{background:#eff6ff}
.normen-item input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--mid)}
.normen-item .din{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--mid);white-space:nowrap;min-width:90px;font-size:10px}
.normen-item .txt{color:#374151}
.normen-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:24px}
.normen-tag{display:inline-flex;align-items:center;gap:4px;background:var(--light);color:var(--dark);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600}
.normen-tag button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0;line-height:1}
.normen-tag button:hover{color:#dc2626}
/* ── ARCHIVE BADGE ── */
.arch-ribbon{display:inline-block;background:#9ca3af;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <div class="topbar-inner">
    <div><div class="tb-sub">Riedel Bau AG · Rohbau</div><div class="tb-logo">📋 LV-Manager v2</div></div>
    <div class="tb-sep"></div>
    <button class="tb-btn red" onclick="newProject()">+ Neues LV</button>
    <button class="tb-btn ghost" onclick="importJSON()">⬆ JSON laden</button>
    <button class="tb-btn ghost" onclick="exportAllJSON()">⬇ Backup</button>
    <div class="tb-spacer"></div>
    <span class="tb-status" id="tb-status"></span>
    <button id="pwa-install-btn" class="tb-btn" onclick="installPWA()"
      style="background:#7c3aed;color:#fff;display:none;font-size:11px;padding:5px 12px">
      📲 Als App installieren
    </button>
  </div>
</div>

<div id="body">

<!-- SIDEBAR -->
<div id="sidebar">
  <input class="sb-search" id="sb-search" placeholder="🔍 LV / Projekt suchen…" oninput="renderSidebar()">
  <div style="flex:1;overflow-y:auto">
    <!-- Projekte -->
    <div class="sb-section" style="display:flex;align-items:center;justify-content:space-between;padding-right:6px">
      <span>Projekte</span>
      <button onclick="newProjekt()" style="background:var(--dark);color:#fff;border:none;border-radius:3px;padding:1px 7px;font-size:10px;cursor:pointer;font-weight:700">+</button>
    </div>
    <div id="sb-projects"></div>
    <!-- LVs im gewählten Projekt -->
    <div class="sb-section" style="margin-top:4px;display:flex;align-items:center;justify-content:space-between;padding-right:6px">
      <span id="sb-lv-label">Alle LVs</span>
      <button onclick="newProject()" style="background:var(--red);color:#fff;border:none;border-radius:3px;padding:1px 7px;font-size:10px;cursor:pointer;font-weight:700">+ LV</button>
    </div>
    <div id="sb-active"></div>
    <div class="sb-section" style="margin-top:4px">Archiv</div>
    <div id="sb-archive"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="tabs-bar" id="tabs-bar" style="display:none">
    <button class="tab active" data-tab="lv" onclick="switchTab('lv')">📋 LV</button>
    <button class="tab" data-tab="stamm" onclick="switchTab('stamm')">📁 Stammdaten</button>
    <button class="tab" data-tab="analyse" onclick="switchTab('analyse')">🔍 VOB-Analyse</button>
    <button class="tab" data-tab="claude" onclick="switchTab('claude')">🤖 Claude-Check</button>
    <button class="tab" data-tab="archiv" onclick="switchTab('archiv')">🗄 Archiv</button>
    <div class="tab-spacer"></div>
    <div class="tab-pills">
      <span id="tp-sum" class="tpill green" style="display:none"></span>
      <span id="tp-crit" class="tpill red" style="display:none"></span>
      <button class="tb-btn green" style="font-size:11px;padding:5px 12px" onclick="exportExcel()">⬇ Excel</button>
      <button class="tb-btn ghost" style="font-size:11px;padding:5px 12px;background:#2563eb;color:#fff" onclick="exportGAEB()">⬇ GAEB</button>
      <button class="tb-btn ghost" style="font-size:11px;padding:5px 12px" onclick="archiveProject()">🗄 Archivieren</button>
    </div>
  </div>
  <div class="tab-body" id="tab-body">
    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📋</div>
      <h1>LV-Manager v2</h1>
      <p>Erstelle dein erstes Leistungsverzeichnis oder lade ein bestehendes Projekt.<br>
      Die Claude-Schnittstelle prüft dein LV automatisch gegen VOB/B und VOB/C.</p>
      <div class="welcome-btns">
        <button class="tb-btn red" style="padding:10px 20px;font-size:13px" onclick="newProject()">+ Neues LV erstellen</button>
        <button class="tb-btn ghost" style="padding:10px 20px;font-size:13px;background:var(--mid);color:#fff" onclick="importJSON()">⬆ LVs importieren</button>
      </div>
    </div>
  </div>
</div>
</div>
</div>

<div id="toast"></div>
<input type="file" id="json-file-in" accept=".json" style="display:none" onchange="handleJSONImport(this)">

<script>
// ════════════════════════════════════════════════════════════════════════
// STATE & STORAGE
// ════════════════════════════════════════════════════════════════════════
const SK = 'lv-mgr-v2';
let DB = { projects: [], apiKey: '' };
let activeId = null;
let currentTab = 'lv';
let collapsed = {};
let chatHistory = [];    // per-project chat
let debounceTimer = null;

function loadDB() {
  try { const d = localStorage.getItem(SK); if(d) DB = {...DB, ...JSON.parse(d)}; } catch(e){}
}
function saveDB() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(()=>{ try{ localStorage.setItem(SK, JSON.stringify(DB)); setStatus('💾 Gespeichert'); } catch(e){} }, 400);
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function setStatus(s) { const el=document.getElementById('tb-status'); if(el) el.textContent=s; }

// ════════════════════════════════════════════════════════════════════════
// CALCULATIONS
// ════════════════════════════════════════════════════════════════════════
function calcGP(pos) {
  const m=parseFloat(pos.menge), e=parseFloat(pos.ep);
  return (!isNaN(m)&&!isNaN(e)) ? +(m*e).toFixed(2) : null;
}
function totalNetto(p) {
  return p.sections.reduce((s,sec)=>s+sec.positions.reduce((ss,pos)=>{ const g=calcGP(pos); return ss+(g||0); },0),0);
}
function critCount(p) {
  return p.sections.reduce((s,sec)=>s+sec.positions.filter(x=>x.status!=='ok').length,0);
}
function posCount(p) {
  return p.sections.reduce((s,sec)=>s+sec.positions.length,0);
}
function fmtEuro(n) {
  if(n===null||n===undefined||isNaN(n)) return '—';
  return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// TOAST
// ════════════════════════════════════════════════════════════════════════
function toast(msg, type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='ok'?'#16a34a':type==='warn'?'#d97706':'#dc2626';
  t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',2800);
}

function getActive() { return DB.projects.find(p=>p.id===activeId)||null; }
function getProject(id) { return DB.projects.find(p=>p.id===id)||null; }

function newProject() {
  const p = {
    id:uid(), name:'Neues LV', gewerk:'DIN 18299 – Allgemeine Regelungen', ort:'',
    ag:'Riedel Bau AG', an:'', bl:'', lvnr:'',
    datum:new Date().toLocaleDateString('de-DE'), ausfzeit:'', leistgrenze:'', norm:'',
    vergabeart:'Freihändige Vergabe (VOB/A § 3)', notes:'',
    sections:defaultSections(), archived:false,
    createdAt:Date.now(), updatedAt:Date.now(), chat:[], projektId:null
  };
  DB.projects.unshift(p);
  saveDB();
  openProject(p.id);
  renderSidebar();
}

function openProject(id) {
  activeId = id;
  document.getElementById('welcome').style.display='none';
  document.getElementById('tabs-bar').style.display='flex';
  const p=getActive();
  // Archivierte LVs öffnen aber mit Hinweis
  if(p&&p.archived){
    toast('⚠ Dieses LV ist archiviert – du kannst es bearbeiten oder reaktivieren','warn');
  }
  updatePills();
  renderSidebar();
  switchTab('lv');
}

function updateProject(fn) {
  const p=getActive(); if(!p) return;
  fn(p);
  p.updatedAt=Date.now();
  saveDB();
  updatePills();
}

function archiveProject() {
  const p=getActive(); if(!p) return;
  if(!confirm(`"${p.name}" archivieren?`)) return;
  p.archived=!p.archived;
  saveDB();
  renderSidebar();
  updatePills();
  // Archiv-Tab sofort aktualisieren falls gerade sichtbar
  if(currentTab==='archiv') { const b=document.getElementById('tab-body'); b.innerHTML=''; renderArchiv(b); }
  toast(p.archived?'🗄 Archiviert – LV in Archiv-Tab sichtbar':'✅ Aus Archiv wiederhergestellt', 'warn');
}

function deleteProjectPermanent(id) {
  if(!confirm('LV unwiderruflich löschen?')) return;
  DB.projects=DB.projects.filter(p=>p.id!==id);
  if(activeId===id){
    activeId=null;
    document.getElementById('welcome').style.display='';
    document.getElementById('tabs-bar').style.display='none';
  }
  saveDB();
  renderSidebar();
  if(currentTab==='archiv'){const b=document.getElementById('tab-body');b.innerHTML='';renderArchiv(b);}
  toast('Gelöscht','warn');
}

// SIDEBAR
// ════════════════════════════════════════════════════════════════════════
function renderSidebar() {
  const q=(document.getElementById('sb-search').value||'').toLowerCase();
  const projekte=getProjekte();

  // ── Projekt-Liste ──────────────────────────────────────────────
  const projEl=document.getElementById('sb-projects');
  let projHTML=`<div class="proj-item${activeProjektId===null?' active':''}" onclick="selectProjekt(null)">
    <span class="proj-dot" style="background:#6b7280"></span>
    <span style="flex:1">Alle Projekte</span>
    <span class="proj-count">${DB.projects.filter(p=>!p.archived).length}</span>
  </div>`;
  projekte.forEach(proj=>{
    const cnt=DB.projects.filter(p=>p.projektId===proj.id&&!p.archived).length;
    projHTML+=`<div class="proj-item${activeProjektId===proj.id?' active':''}" onclick="selectProjekt('${proj.id}')">
      <span class="proj-dot" style="background:${proj.farbe}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(proj.name)}">${esc(proj.name)}</span>
      <span class="proj-count">${cnt}</span>
      <button class="proj-edit-btn" onclick="renameProjekt('${proj.id}',event)" title="Umbenennen">✏</button>
      <button class="proj-edit-btn" onclick="deleteProjekt('${proj.id}',event)" title="Löschen" style="color:#dc2626">✕</button>
    </div>`;
  });
  if(projEl) projEl.innerHTML=projHTML;

  // Label aktualisieren
  const lblEl=document.getElementById('sb-lv-label');
  if(lblEl){
    if(activeProjektId){
      const proj=projekte.find(p=>p.id===activeProjektId);
      lblEl.textContent=proj?proj.name:'LVs';
    } else { lblEl.textContent='Alle LVs'; }
  }

  // ── LV-Liste gefiltert nach Projekt ───────────────────────────
  let lvs=DB.projects.filter(p=>!p.archived);
  if(activeProjektId) lvs=lvs.filter(p=>p.projektId===activeProjektId);
  if(q) lvs=lvs.filter(p=>p.name.toLowerCase().includes(q)||p.gewerk.toLowerCase().includes(q));

  let arch=DB.projects.filter(p=>p.archived);
  if(q) arch=arch.filter(p=>p.name.toLowerCase().includes(q));

  const projekte2=getProjekte();
  function itemHTML(p) {
    const isAct=p.id===activeId;
    const c=critCount(p);
    const proj=projekte2.find(pr=>pr.id===p.projektId);
    return `<div class="sb-item${isAct?' active':''}${p.archived?' archived':''}" onclick="openProject('${p.id}')">
      ${proj?`<span class="proj-dot" style="background:${proj.farbe};margin-right:2px"></span>`:'<span class="sb-icon">📋</span>'}
      <span class="sb-name" title="${esc(p.name)}">${esc(p.name)}</span>
      ${c>0?`<span class="sb-badge crit">${c}</span>`:''}
    </div>`;
  }

  document.getElementById('sb-active').innerHTML = lvs.length
    ? lvs.map(itemHTML).join('')
    : `<div style="padding:10px 12px;font-size:11px;color:var(--muted)">
        ${activeProjektId?'Keine LVs in diesem Projekt':'Keine LVs vorhanden'}
      </div>`;
  document.getElementById('sb-archive').innerHTML = arch.length
    ? arch.map(itemHTML).join('')
    : '<div style="padding:10px 12px;font-size:11px;color:var(--muted)">Archiv leer</div>';
}

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const body=document.getElementById('tab-body');
  if(tab==='lv')      { body.innerHTML=''; renderLV(body); }
  if(tab==='stamm')   { body.innerHTML=''; renderStamm(body); }
  if(tab==='analyse') { body.innerHTML=''; renderAnalyse(body); }
  if(tab==='claude')  { body.innerHTML=''; renderClaude(body); }
  if(tab==='archiv')  { body.innerHTML=''; renderArchiv(body); }
}

// ════════════════════════════════════════════════════════════════════════
// LV TAB — event-delegation, no re-render on input
// ════════════════════════════════════════════════════════════════════════
function renderLV(container) {
  const p=getActive(); if(!p) return;
  const el=document.createElement('div');
  el.id='lv-root';

  // Build HTML
  let html='';
  p.sections.forEach((sec,si)=>{
    const isCol=collapsed[sec.id];
    html+=`<div class="sec-card" data-sec="${sec.id}">
      <div class="sec-hdr">
        <span class="sec-num">0${si+1}</span>
        <input class="sec-inp" value="${esc(sec.title)}" data-secfield="${sec.id}:title" placeholder="Abschnittstitel…">
        <button class="sec-btn sec-collapse" onclick="toggleCollapse('${sec.id}')">
          ${isCol?'▼ Aufklappen':'▲ Einklappen'}</button>
        <button class="sec-btn sec-del" onclick="confirmDeleteSection('${sec.id}')">✕</button>
      </div>`;
    if(!isCol){
      html+=`<div class="col-hdr"><span>E.</span><span>OZ</span><span>Beschreibung</span>
        <span>ME</span><span>Menge</span><span>EP €</span><span>GP €</span>
        <span>VOB-Ref.</span><span>Aktionen</span></div>`;
      if(!sec.positions.length) html+=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:11px">Noch keine Positionen – klicke "+ Position"</div>`;
      sec.positions.forEach(pos=>{
        const gp=calcGP(pos);
        const st=STATUS_CFG[pos.status]||STATUS_CFG.ok;
        html+=`<div class="pos-row${pos.added?' pos-added':''}" data-pos="${pos.id}" data-sec="${sec.id}">
          <div><select class="stat-sel" style="background:${st.bg}" data-field="status" title="${st.label}">
            ${Object.entries(STATUS_CFG).map(([k,v])=>`<option value="${k}"${pos.status===k?' selected':''}>${v.icon}</option>`).join('')}
          </select></div>
          <div><input value="${esc(pos.oz)}" data-field="oz" placeholder="01.01"
            style="font-family:'IBM Plex Mono',monospace;font-size:10px"></div>
          <div>
            <textarea rows="2" data-field="desc" placeholder="Leistungsbeschreibung…">${esc(pos.desc)}</textarea>
            ${pos.added?'<span class="added-tag">🔵 ERGÄNZT</span>':''}
          </div>
          <div><select data-field="unit">${UNITS.map(u=>`<option${pos.unit===u?' selected':''} value="${u}">${u}</option>`).join('')}</select></div>
          <div><input type="number" value="${esc(String(pos.menge))}" data-field="menge" placeholder="—"
            style="text-align:right;background:var(--yin)"></div>
          <div><input type="number" value="${esc(String(pos.ep))}" data-field="ep" placeholder="—"
            style="text-align:right;background:var(--yin)"></div>
          <div class="gp-val${gp===null?' gp-empty':''}" data-gp="${pos.id}">${gp!==null?fmtEuro(gp):'—'}</div>
          <div><input value="${esc(pos.vob)}" data-field="vob" placeholder="VOB-Referenz…"
            style="font-size:10px;color:#6b7280"></div>
          <div class="pos-acts">
            <button class="act-btn act-dup" data-dup="${pos.id}">⧉</button>
            <button class="act-btn act-del" data-delpos="${pos.id}">✕</button>
          </div>
        </div>`;
      });
      html+=`<div class="sec-footer">
        <button class="add-pos-btn" data-addpos="${sec.id}">+ Position hinzufügen</button>
      </div>`;
    }
    html+=`</div>`;
  });

  const n=totalNetto(p), mwst=n*0.19;
  html+=`<button class="add-sec-btn" id="add-sec-btn">+ Neuen Abschnitt hinzufügen</button>
  <div class="totals-box">
    <div class="tot-row"><span class="tot-lbl">Netto gesamt:</span><span class="tot-val" id="tot-netto">${fmtEuro(n)}</span></div>
    <div class="tot-row"><span class="tot-lbl">zzgl. 19 % MwSt.:</span><span class="tot-val" id="tot-mwst">${fmtEuro(mwst)}</span></div>
    <div class="tot-row big"><span class="tot-lbl" style="font-weight:700;color:#fff;font-size:13px">Brutto gesamt:</span><span class="tot-val gold" id="tot-brutto">${fmtEuro(n+mwst)}</span></div>
  </div>`;

  el.innerHTML=html;
  container.appendChild(el);

  // ── Event delegation — ONE listener on root ──────────────────────────
  el.addEventListener('change', e=>{
    const t=e.target;
    // Section title
    const sf=t.dataset.secfield;
    if(sf){ const [sid,field]=sf.split(':'); updateProject(p=>{ const s=p.sections.find(s=>s.id===sid); if(s)s[field]=t.value; }); return; }
    // Position field
    const posRow=t.closest('[data-pos]');
    if(posRow&&t.dataset.field){
      const pid=posRow.dataset.pos, sid=posRow.dataset.sec;
      updateProject(p=>{
        const sec=p.sections.find(s=>s.id===sid); if(!sec) return;
        const pos=sec.positions.find(pos=>pos.id===pid); if(!pos) return;
        pos[t.dataset.field]=t.value;
        // Live GP update
        const gp=calcGP(pos);
        const gpEl=el.querySelector(`[data-gp="${pid}"]`);
        if(gpEl){ gpEl.textContent=gp!==null?fmtEuro(gp):'—'; gpEl.className='gp-val'+(gp===null?' gp-empty':''); }
        // Update totals
        const nn=totalNetto(p), mm=nn*0.19;
        const tn=document.getElementById('tot-netto'); if(tn)tn.textContent=fmtEuro(nn);
        const tm=document.getElementById('tot-mwst'); if(tm)tm.textContent=fmtEuro(mm);
        const tb=document.getElementById('tot-brutto'); if(tb)tb.textContent=fmtEuro(nn+mm);
      });
    }
  });

  el.addEventListener('click', e=>{
    const t=e.target;
    // Add position
    if(t.dataset.addpos){ addPos(t.dataset.addpos); return; }
    // Dup position
    if(t.dataset.dup){ dupPos(t.dataset.dup); return; }
    // Del position
    if(t.dataset.delpos){ deletePos(t.dataset.delpos); return; }
    // Add section
    if(t.id==='add-sec-btn'){ addSection(); return; }
  });
}

function toggleCollapse(sid){collapsed[sid]=!collapsed[sid];switchTab('lv');}
function confirmDeleteSection(sid){if(confirm('Abschnitt löschen?'))deleteSection(sid);}
function deleteSection(sid){updateProject(p=>{p.sections=p.sections.filter(s=>s.id!==sid)});switchTab('lv');}
function addSection(){updateProject(p=>{p.sections.push({id:uid(),title:'Neuer Abschnitt',positions:[]})});switchTab('lv');}

function addPos(sid){
  updateProject(p=>{
    const s=p.sections.find(s=>s.id===sid);
    if(s)s.positions.push(mkPos());
  }); switchTab('lv');
}
function dupPos(pid){
  updateProject(p=>{
    for(const sec of p.sections){
      const i=sec.positions.findIndex(pos=>pos.id===pid);
      if(i>=0){const c={...sec.positions[i],id:uid(),oz:sec.positions[i].oz+' (Kopie)'};sec.positions.splice(i+1,0,c);return;}
    }
  }); switchTab('lv');
}
function deletePos(pid){
  updateProject(p=>{for(const sec of p.sections){const i=sec.positions.findIndex(pos=>pos.id===pid);if(i>=0){sec.positions.splice(i,1);return;}}});
  switchTab('lv');
}

function toggleNormenGroup(gi) {
  const body=document.getElementById('ng-body-'+gi);
  const arrow=document.getElementById('ng-arrow-'+gi);
  if(!body) return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'';
  if(arrow) arrow.textContent=isOpen?'▶':'▼';
}

function filterNormen(q) {
  const lq=q.toLowerCase();
  NORMEN_GRUPPEN.forEach((g,gi)=>{
    const body=document.getElementById('ng-body-'+gi);
    const hdr=document.querySelector(`[data-group="${gi}"] .normen-group-hdr`);
    if(!body) return;
    let anyVisible=false;
    body.querySelectorAll('.normen-item').forEach(item=>{
      const din=item.querySelector('.din')?.textContent||'';
      const txt=item.querySelector('.txt')?.textContent||'';
      const vis=!lq||din.toLowerCase().includes(lq)||txt.toLowerCase().includes(lq);
      item.style.display=vis?'':'none';
      if(vis) anyVisible=true;
    });
    // Auto-expand group if search matches
    if(lq && anyVisible) { body.style.display=''; const a=document.getElementById('ng-arrow-'+gi); if(a)a.textContent='▼'; }
    if(hdr) hdr.style.display=(!lq||anyVisible)?'':'none';
  });
}

function renderStamm(container) {
  const p=getActive(); if(!p) return;
  // Projekt-Zuordnung oben

    <label>📁 Projekt-Zuordnung</label>

    </div>
  </div>`:'<div class="sf full" style="margin-bottom:4px"><label>📁 Projekt-Zuordnung</label><div style="display:flex;gap:8px"><span style="font-size:12px;color:var(--muted);padding:7px 0">Noch keine Projekte –</span><button onclick="newProjekt()" style="background:var(--dark);color:#fff;padding:6px 12px;font-size:11px;border-radius:5px;border:none;cursor:pointer">+ Erstes Projekt erstellen</button></div></div>';

  const fields=[
    ['name','LV-Bezeichnung','text','z.B. Rohbauarbeiten EG'],
    ['gewerk','Gewerk / Leistungsbereich','gewerk',''],
    ['ort','Bauvorhaben / Adresse','text','z.B. Musterstraße 1, 80809 München'],
    ['ag','Auftraggeber (AG)','text','z.B. Riedel Bau AG'],
    ['an','Auftragnehmer (AN)','text','z.B. Musterfirma GmbH'],
    ['bl','Bauleiter','text',''],
    ['lvnr','LV-Nummer / VE','text','z.B. 25-0210'],
    ['datum','Ausschreibungsdatum','text',''],
    ['ausfzeit','Ausführungszeitraum','text','z.B. 01.03.2026 – 30.09.2026'],
    ['leistgrenze','Leistungsgrenze / Schnittstellen','text','z.B. OK Bodenplatte bis ÜS / Übergabe an TGA'],
    ['norm','Anzuwendende Normen / ATV','normen-picker',''],
    ['vergabeart','Vergabeart','vergabeart',''],
  ];
  let html=`<div class="stamm-grid">${projSelect}`;
  fields.forEach(([field,label,type,ph])=>{
    if(type==='normen-picker'){
      html+=buildNormenPicker(p);
      return;
    }
    html+=`<div class="sf"><label>${label}</label>`;
    if(type==='gewerk')
      html+=`<select data-sfield="${field}" style="font-size:11px">${GEWERKE.map(g=>`<option${p[field]===g?' selected':''} value="${g}">${g}</option>`).join('')}</select>`;
    else if(type==='vergabeart')
      html+=`<select data-sfield="${field}">${VERGABEARTEN.map(g=>`<option${p[field]===g?' selected':''} value="${g}">${g}</option>`).join('')}</select>`;
    else
      html+=`<input value="${esc(p[field]||'')}" placeholder="${ph}" data-sfield="${field}">`;
    html+=`</div>`;
  });
  html+=`<div class="sf full"><label>Notizen</label>
    <textarea rows="4" data-sfield="notes" placeholder="Besonderheiten, Risiken…">${esc(p.notes||'')}</textarea>
  </div></div>
  <div style="margin-top:16px;padding:12px;background:#f9fafb;border-radius:7px;font-size:11px;color:var(--muted)">
    Erstellt: ${new Date(p.createdAt).toLocaleString('de-DE')} &nbsp;|&nbsp; Geändert: ${new Date(p.updatedAt).toLocaleString('de-DE')} &nbsp;|&nbsp; Positionen: ${posCount(p)} &nbsp;|&nbsp; Status: ${p.archived?'🗄 Archiviert':'✅ Aktiv'} &nbsp;|&nbsp; Netto: ${fmtEuro(totalNetto(p))}
  </div>`;
  const el=document.createElement('div');
  el.innerHTML=html;
  container.appendChild(el);

  // Event delegation for stamm
  el.addEventListener('change',e=>{
    const f=e.target.dataset.sfield;
    if(f) updateProject(p=>{ p[f]=e.target.value; });
    // Normen checkbox
    const din=e.target.dataset.normenCheck;
    if(din) {
      updateProject(p=>{
        const arr=getNormenArray(p);
        if(e.target.checked){ if(!arr.includes(din)) arr.push(din); }
        else { const i=arr.indexOf(din); if(i>=0) arr.splice(i,1); }
        p.normArr=arr; p.norm=normenToString(arr);

      </span>`).join('');
      // Update selected class
      const lbl=e.target.closest('.normen-item');
      if(lbl) lbl.classList.toggle('selected', e.target.checked);
      // Update group counter
      const gi=lbl?.dataset.gi;
      if(gi!==undefined){
        const pp2=getActive();
        const arr2=getNormenArray(pp2);
        const g=NORMEN_GRUPPEN[gi];
        const cnt=g?g.normen.filter(n=>arr2.includes(n.din)).length:0;

  el.addEventListener('click',e=>{
    const din=e.target.dataset.removenorm;
    if(din){
      updateProject(p=>{
        const arr=getNormenArray(p);
        const i=arr.indexOf(din); if(i>=0) arr.splice(i,1);
        p.normArr=arr; p.norm=normenToString(arr);
      });
      switchTab('stamm');
    }
  });
}

function renderAnalyse(container) {
  const p=getActive(); if(!p) return;

  const counts={ok:0,warn:0,gap:0,star:0};

  let html=`<div class="vob-grid">`;
  Object.entries(STATUS_CFG).forEach(([k,v])=>{
    html+=`<div class="vob-card ${k}" style="border-color:${v.col};background:${v.bg}">

    crit.forEach(pos=>{
      const st=STATUS_CFG[pos.status];
      html+=`<tr>
        <td><span style="background:${st.bg};border-radius:3px;padding:2px 4px">${st.icon}</span></td>
        <td style="font-family:'IBM Plex Mono',monospace;color:#2563eb;font-weight:600">${esc(pos.oz)}</td>
        <td style="color:var(--muted)">${esc(pos.secTitle)}</td>

        <td><span style="background:${st.bg};color:${st.col};padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700">${st.label}</span></td>
        <td>${esc(pos.vob)}</td>
      </tr>`;
    });
    html+=`</tbody></table>
    <h3 style="margin:18px 0 10px;font-size:12px;font-weight:700;color:var(--dark)">Handlungsempfehlungen</h3>`;
    crit.forEach(pos=>{
      const st=STATUS_CFG[pos.status];
      html+=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">

          data-notsec="${pos.secId}" data-notpos="${pos.id}">
      </div>`;
    });
  }
  const el=document.createElement('div');
  el.innerHTML=html;
  container.appendChild(el);
  el.addEventListener('change',e=>{
    const sid=e.target.dataset.notsec, pid=e.target.dataset.notpos;

    });
  });

function copyToClipboard(text, label) {
  navigator.clipboard.writeText(text).then(()=>{
    toast(`✓ "${label}" kopiert → claude.ai öffnen und einfügen`);
  }).catch(()=>{
    // Fallback für ältere Browser
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast(`✓ "${label}" kopiert`); }
    catch(e){ toast('Kopieren fehlgeschlagen – bitte manuell','warn'); }
    document.body.removeChild(ta);
  });
}

function buildLVContext(p){
  let ctx=`LV: ${p.name} | Gewerk: ${p.gewerk}\n`;
  ctx+=`Bauvorhaben: ${p.ort}\n`;
  ctx+=`AG: ${p.ag} | AN: ${p.an||'—'} | BL: ${p.bl} | LV-Nr: ${p.lvnr}\n`;
  ctx+=`Ausführung: ${p.ausfzeit||'—'} | Vergabeart: ${p.vergabeart||'—'}\n`;
  ctx+=`Leistungsgrenze: ${p.leistgrenze||'—'} | Normen: ${p.norm||'—'}\n\n`;
  p.sections.forEach((sec,si)=>{
    ctx+=`--- Abschnitt ${si+1}: ${sec.title} ---\n`;
    sec.positions.forEach(pos=>{
      const st=STATUS_CFG[pos.status];
      ctx+=`[${st.icon}] ${pos.oz} | ${pos.desc.replace(/\n/g,' ')} | ${pos.unit} | Menge:${pos.menge||'?'} | EP:${pos.ep||'?'} | VOB:${pos.vob}\n`;
    });
  });
  ctx+=`\nNetto gesamt: ${fmtEuro(totalNetto(p))}\n`;
  return ctx;
}

// EXCEL EXPORT
// ════════════════════════════════════════════════════════════════════════
function exportExcel(){
  const p=getActive()||getProject(activeId); if(!p){toast('Kein Projekt ausgewählt','warn');return;}
  const wb=XLSX.utils.book_new();
  // Sheet 1
  const rows=[];
  rows.push([p.name||'LV','','','','','','','']);
  rows.push(['Gewerk: '+p.gewerk,'','Ort: '+p.ort,'','Datum: '+p.datum,'','LV-Nr: '+p.lvnr,'']);
  rows.push(['AG: '+p.ag,'','BL: '+p.bl,'','','','','']);
  rows.push([]);
  rows.push(['Status','OZ','Beschreibung','ME','Menge','EP (€)','GP (€)','VOB-Referenz']);
  let netto=0;
  p.sections.forEach(sec=>{
    rows.push(['► '+sec.title,'','','','','','','']);
    sec.positions.forEach(pos=>{
      const gp=calcGP(pos); if(gp!==null)netto+=gp;
      const st=STATUS_CFG[pos.status]||STATUS_CFG.ok;
      rows.push([st.icon,pos.oz,(pos.desc||'').replace(/\n/g,' | '),pos.unit,
        pos.menge!==''?parseFloat(pos.menge)||'':'',
        pos.ep!==''?parseFloat(pos.ep)||'':'',
        gp!==null?gp:'',
        pos.vob+(pos.note?' | '+pos.note:'')]);
    });
    rows.push([]);
  });
  rows.push(['','','','','','Netto:',netto,'']);
  rows.push(['','','','','','MwSt 19%:',+(netto*0.19).toFixed(2),'']);
  rows.push(['','','','','','Brutto:',+(netto*1.19).toFixed(2),'']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:6},{wch:12},{wch:55},{wch:8},{wch:10},{wch:12},{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws,'Leistungsverzeichnis');
  // Sheet 2: VOB
  const vr=[['Status','OZ','Abschnitt','Beschreibung','Einordnung','VOB-Referenz','Empfehlung']];
  p.sections.forEach(sec=>sec.positions.filter(pos=>pos.status!=='ok').forEach(pos=>{
    const st=STATUS_CFG[pos.status]||STATUS_CFG.ok;
    vr.push([st.icon,pos.oz,sec.title,(pos.desc||'').split('\n')[0],st.label,pos.vob,pos.note||'']);
  }));
  const ws2=XLSX.utils.aoa_to_sheet(vr);
  ws2['!cols']=[{wch:6},{wch:12},{wch:28},{wch:45},{wch:28},{wch:35},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws2,'VOB-Analyse');
  // Sheet 3: Stamm
  const sr=[['Feld','Wert'],...Object.entries({'LV-Bezeichnung':p.name,'Gewerk':p.gewerk,'Bauvorhaben':p.ort,'AG':p.ag,'AN':p.an||'','BL':p.bl,'LV-Nr':p.lvnr,'Datum':p.datum,'Ausführungszeitraum':p.ausfzeit||'','Leistungsgrenze':p.leistgrenze||'','Normen':p.norm||'','Vergabeart':p.vergabeart||'','Notizen':p.notes||''}).map(([k,v])=>[k,v||''])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sr),'Stammdaten');
  const fname=(p.name||'LV').replace(/[^\w\-äöüÄÖÜß ]/g,'').trim();
  XLSX.writeFile(wb,fname+'.xlsx');
  toast('Excel exportiert ✓');
}

// GAEB EXPORT (DA83 / X83 — Angebotsaufforderung)
// ════════════════════════════════════════════════════════════════════════
function exportGAEB(){
  const p=getActive()||getProject(activeId); if(!p){toast('Kein Projekt ausgewählt','warn');return;}
  const now=new Date();
  const fmt4=n=>String(n).padStart(4,'0');
  const lines=[];
  lines.push('<?xml version="1.0" encoding="UTF-8"?>');
  lines.push('<GAEB xmlns="http://www.gaeb.de/GAEB_DA_XML/200407" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">');
  lines.push('  <GAEBInfo>');
  lines.push('    <Handshake>DA83</Handshake>');
  lines.push(`    <CreatedAt>${now.toISOString()}</CreatedAt>`);
  lines.push(`    <GeneratedBy>Riedel Bau AG LV-Manager v2</GeneratedBy>`);
  lines.push('  </GAEBInfo>');
  lines.push('  <Award>');
  lines.push(`    <DP>11</DP>`);
  lines.push(`    <PrjInfo>`);
  lines.push(`      <LblPrj>${xmlEsc(p.lvnr||p.name)}</LblPrj>`);
  lines.push(`      <NamePrj>${xmlEsc(p.name)}</NamePrj>`);
  lines.push(`      <OrtPrj>${xmlEsc(p.ort)}</OrtPrj>`);
  lines.push(`      <AG>${xmlEsc(p.ag)}</AG>`);
  lines.push(`    </PrjInfo>`);
  lines.push('    <BO>');
  // Sections → LV Items
  let posNum=0;
  p.sections.forEach((sec,si)=>{
    lines.push(`      <Pos>`);
    lines.push(`        <PosID>${fmt4(si+1)}00</PosID>`);
    lines.push(`        <RNoPart>${fmt4(si+1)}</RNoPart>`);
    lines.push(`        <PosTyp>1</PosTyp>`);
    lines.push(`        <LongText>${xmlEsc(sec.title)}</LongText>`);
    lines.push(`      </Pos>`);
    sec.positions.forEach((pos,pi)=>{
      posNum++;
      const gp=calcGP(pos);
      lines.push(`      <Pos>`);
      lines.push(`        <PosID>${fmt4(si+1)}${fmt4(pi+1).slice(1)}</PosID>`);
      lines.push(`        <RNoPart>${fmt4(si+1)}</RNoPart>`);
      lines.push(`        <RNoPos>${fmt4(pi+1)}</RNoPos>`);
      lines.push(`        <PosTyp>0</PosTyp>`);
      lines.push(`        <Description>`);
      lines.push(`          <CompleteText>`);
      lines.push(`            <DetailTxt>`);
      lines.push(`              <Text>${xmlEsc(pos.desc)}</Text>`);
      lines.push(`            </DetailTxt>`);
      lines.push(`          </CompleteText>`);
      lines.push(`        </Description>`);
      lines.push(`        <Qty>${pos.menge||0}</Qty>`);
      lines.push(`        <QU>${xmlEsc(pos.unit)}</QU>`);
      if(pos.ep) lines.push(`        <UP>${parseFloat(pos.ep)||0}</UP>`);
      if(gp!==null) lines.push(`        <TP>${gp}</TP>`);
      lines.push(`      </Pos>`);
    });
  });
  const n=totalNetto(p);
  lines.push(`      <Pos><PosID>9999</PosID><PosTyp>2</PosTyp><LongText>Summe Netto</LongText><TP>${n.toFixed(2)}</TP></Pos>`);
  lines.push('    </BO>');
  lines.push('  </Award>');
  lines.push('</GAEB>');

  const xml=lines.join('\n');
  const blob=new Blob([xml],{type:'application/xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const fname=(p.name||'LV').replace(/[^\w\-äöüÄÖÜß ]/g,'').trim();
  a.download=fname+'_DA83.X83';
  a.click();
  toast('GAEB DA83 exportiert ✓ (für iTWO)');
}

function xmlEsc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function handleJSONImport(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.projects){DB.projects=[...d.projects,...DB.projects];if(d.apiKey&&!DB.apiKey)DB.apiKey=d.apiKey;}
      else if(Array.isArray(d))DB.projects=[...d,...DB.projects];
      saveDB(); renderSidebar(); toast('Importiert: '+((d.projects||d).length)+' LVs');
    }catch(err){toast('Ungültige Datei','err');}
  };
  r.readAsText(f); input.value='';
}

// PROJEKT-STRUKTUR
// ════════════════════════════════════════════════════════════════════════
let activeProjektId = null; // null = alle LVs

const PROJ_COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#be185d','#065f46'];

function getProjekte() { return DB.projekte || []; }

function newProjekt() {
  const name = prompt('Projektname:','Projekt München 2026');
  if(!name || !name.trim()) return;
  if(!DB.projekte) DB.projekte=[];
  const farbe = PROJ_COLORS[DB.projekte.length % PROJ_COLORS.length];
  const proj = {id:uid(), name:name.trim(), farbe, createdAt:Date.now()};
  DB.projekte.push(proj);
  saveDB();
  activeProjektId = proj.id;
  renderSidebar();
  toast('Projekt "'+proj.name+'" erstellt');
}

function renameProjekt(id, e) {
  e.stopPropagation();
  const proj = DB.projekte.find(p=>p.id===id); if(!proj) return;
  const name = prompt('Projekt umbenennen:', proj.name);
  if(name && name.trim()) { proj.name=name.trim(); saveDB(); renderSidebar(); }
}

function deleteProjekt(id, e) {
  e.stopPropagation();
  const proj = DB.projekte.find(p=>p.id===id); if(!proj) return;
  const lvCount = DB.projects.filter(p=>p.projektId===id).length;
  if(!confirm(`Projekt "${proj.name}" löschen?${lvCount>0?' Die '+lvCount+' enthaltenen LVs werden keinem Projekt zugeordnet.':''}`)) return;
  DB.projekte = DB.projekte.filter(p=>p.id!==id);
  DB.projects.forEach(p=>{ if(p.projektId===id) p.projektId=null; });
  if(activeProjektId===id) activeProjektId=null;
  saveDB(); renderSidebar();
  toast('Projekt gelöscht','warn');
}

function selectProjekt(id) {
  activeProjektId = id;
  renderSidebar();
}

function moveLVtoProjekt(lvId, projektId) {
  const lv = DB.projects.find(p=>p.id===lvId); if(!lv) return;
  lv.projektId = projektId;
  saveDB(); renderSidebar();
  const proj = projektId ? DB.projekte.find(p=>p.id===projektId) : null;
  toast('LV verschoben'+(proj?' → '+proj.name:'→ Kein Projekt'));
}

function installPWA() {
  if(!deferredInstallPrompt) {
    toast('Installation: Klicke in der Browser-Adressleiste auf das ⊕ Symbol rechts', 'warn');
    return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(r => {
    if(r.outcome === 'accepted') toast('App wird installiert…');
    deferredInstallPrompt = null;
  });
}
